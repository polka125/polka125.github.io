<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Chronos Interface</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #d4af37;
            opacity: 0.5;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">SYSTEM: CHRONOS_V3 // STATUS: ACTIVE</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let frame = 0;
        
        // Configuration
        const config = {
            baseColor: { h: 45, s: 80, l: 60 }, // Amber/Gold
            rings: 8,
            speed: 1,
            glyphSet: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<>/\\|[]{}*+-_=^',
        };

        // Ring State
        const rings = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initRings();
        }

        class Ring {
            constructor(index, totalRings) {
                this.index = index;
                this.radius = 50 + (index * 45); // Spacing between rings
                this.segments = 8 + (index * 6); // More segments on outer rings
                this.rotation = 0;
                this.targetRotation = 0;
                this.rotationSpeed = (index % 2 === 0 ? 1 : -1) * (0.002 + Math.random() * 0.005);
                this.chars = [];
                this.colorOffset = Math.random() * 50;
                this.tickTimer = 0;
                this.tickInterval = 60 + Math.floor(Math.random() * 120); // Frames between shifts
                this.isMoving = false;
                this.moveProgress = 0;
                this.glitchFactor = 0;

                // Populate segments
                for (let i = 0; i < this.segments; i++) {
                    this.chars.push(config.glyphSet[Math.floor(Math.random() * config.glyphSet.length)]);
                }
            }

            update() {
                // Constant slow drift
                this.rotation += this.rotationSpeed * 0.1;

                // Mechanical "Tick" Logic
                this.tickTimer++;
                if (this.tickTimer > this.tickInterval && !this.isMoving) {
                    this.isMoving = true;
                    this.moveProgress = 0;
                    // Rotate by exactly one segment width
                    const segmentAngle = (Math.PI * 2) / this.segments;
                    this.targetRotation = this.rotation + (segmentAngle * (Math.random() > 0.5 ? 1 : -1));
                    
                    // Randomly change a character during movement
                    const charIndex = Math.floor(Math.random() * this.segments);
                    this.chars[charIndex] = config.glyphSet[Math.floor(Math.random() * config.glyphSet.length)];
                    
                    // Trigger glitch
                    this.glitchFactor = 1.0;
                }

                if (this.isMoving) {
                    this.moveProgress += 0.05; // Speed of the mechanical snap
                    
                    // Elastic easing function for "mechanical" feel
                    const t = this.moveProgress;
                    const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

                    // Interpolate
                    this.rotation = this.rotation + (this.targetRotation - this.rotation) * 0.1;

                    if (this.moveProgress >= 1) {
                        this.isMoving = false;
                        this.tickTimer = 0;
                        // Reset interval randomly
                        this.tickInterval = 40 + Math.floor(Math.random() * 100); 
                    }
                }

                // Decay glitch
                if (this.glitchFactor > 0) this.glitchFactor -= 0.05;
            }

            draw(ctx, centerX, centerY) {
                const segmentAngle = (Math.PI * 2) / this.segments;

                ctx.save();
                ctx.translate(centerX, centerY);
                
                // Draw Ring Path
                ctx.beginPath();
                ctx.strokeStyle = `hsla(${config.baseColor.h}, ${config.baseColor.s}%, ${20}%, 0.3)`;
                ctx.lineWidth = 1;
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.stroke();

                // Draw Segments
                ctx.rotate(this.rotation);

                for (let i = 0; i < this.segments; i++) {
                    ctx.save();
                    const angle = i * segmentAngle;
                    ctx.rotate(angle);
                    ctx.translate(0, -this.radius);

                    // Determine Opacity/Brightness based on "Active" position (top of ring)
                    // We calculate the absolute angle of this segment relative to the screen up
                    let absAngle = (angle + this.rotation) % (Math.PI * 2);
                    if (absAngle < 0) absAngle += Math.PI * 2;
                    
                    // Check if near 12 o'clock (0 or 2PI)
                    // Note: Canvas 0 is 3 o'clock usually, but we rotated context. 
                    // Actually, let's just use distance from center vertical alignment for effect.
                    
                    const isHighlighted = Math.abs(absAngle) < 0.2 || Math.abs(absAngle - Math.PI*2) < 0.2;
                    
                    let l = config.baseColor.l;
                    let a = 0.6;
                    
                    if (isHighlighted) {
                        l = 90;
                        a = 1;
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = `hsla(${config.baseColor.h}, 100%, 70%, 0.8)`;
                    } else if (this.glitchFactor > 0.1 && Math.random() > 0.7) {
                        // Glitch flicker
                        l = 100;
                        ctx.translate(Math.random() * 5 - 2.5, 0);
                    }

                    ctx.fillStyle = `hsla(${config.baseColor.h}, ${config.baseColor.s}%, ${l}%, ${a})`;
                    ctx.font = `${Math.min(14, 1000/this.segments)}px "Courier New"`;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";

                    // Draw Character
                    ctx.fillText(this.chars[i], 0, 0);
                    
                    // Draw little tick mark
                    ctx.fillStyle = `hsla(${config.baseColor.h}, ${config.baseColor.s}%, 30%, 0.5)`;
                    ctx.fillRect(-1, 8, 2, 4);

                    ctx.restore();
                }

                ctx.restore();
            }
        }

        function initRings() {
            rings.length = 0;
            for (let i = 0; i < config.rings; i++) {
                rings.push(new Ring(i, config.rings));
            }
        }

        // Background Grid
        function drawGrid() {
            ctx.strokeStyle = '#111';
            ctx.lineWidth = 1;
            const step = 50;
            
            // Perspective Grid effect
            const time = Date.now() * 0.0005;
            
            ctx.beginPath();
            for (let x = 0; x <= width; x += step) {
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
            }
            for (let y = 0; y <= height; y += step) {
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
            }
            ctx.stroke();
        }

        function drawScanlines() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            for (let i = 0; i < height; i += 4) {
                ctx.fillRect(0, i, width, 2);
            }
        }

        function drawVignette() {
            const gradient = ctx.createRadialGradient(width/2, height/2, height/3, width/2, height/2, height);
            gradient.addColorStop(0, "transparent");
            gradient.addColorStop(1, "rgba(0,0,0,0.8)");
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }

        function animate() {
            // Trail effect
            ctx.fillStyle = 'rgba(5, 5, 5, 0.3)';
            ctx.fillRect(0, 0, width, height);

            drawGrid();

            const cx = width / 2;
            const cy = height / 2;

            // Update and Draw Rings
            rings.forEach(ring => {
                ring.update();
                ring.draw(ctx, cx, cy);
            });

            // Center Core
            ctx.beginPath();
            ctx.arc(cx, cy, 30, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();
            ctx.strokeStyle = `hsl(${config.baseColor.h}, 100%, 50%)`;
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Pulsing Core Text
            ctx.fillStyle = `hsl(${config.baseColor.h}, 100%, 70%)`;
            ctx.font = "10px monospace";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            const pulse = Math.sin(Date.now() / 200) * 0.5 + 0.5;
            ctx.globalAlpha = 0.5 + (pulse * 0.5);
            ctx.fillText(frame % 2 === 0 ? "RDY" : "RUN", cx, cy);
            ctx.globalAlpha = 1;

            // Post Processing
            drawScanlines();
            drawVignette();

            frame++;
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();

    </script>
</body>
</html>

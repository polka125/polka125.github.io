<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triangle Renderer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #222;
            display: flex;
            flex-direction: row;
            height: 100vh;
            font-family: sans-serif;
            user-select: none;
            cursor: crosshair; 
        }

        #canvasContainer {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            background-color: #222;
        }

        canvas {
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background-color: white;
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>

    <!-- Canvas Container -->
    <div id="canvasContainer">
        <canvas id="mainCanvas" width="800" height="600"></canvas>
    </div>

    <script src="./triangle_v01.js"></script>

</body>
</html>
